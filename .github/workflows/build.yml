# Build workflow - mirrors ReleaseJenkinsfile operations but without publishing
# artifacts, deploying site to gh-pages, or committing/pushing generated versions.
# Triggered automatically by any push/commit operation.

name: Build

on:
  push:

# Mirrors ReleaseJenkinsfile's disableConcurrentBuilds() - cancel any
# in-progress run on the same branch before starting a new one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Configure Maven settings so it can read from the GitHub Packages repository
      # (https://maven.pkg.github.com/MRISS-Projects/maven-repo) where
      # com.mriss:mriss-parent is hosted.
      #
      # Two things are needed:
      # 1. <servers> — credentials (GitHub Packages always requires authentication).
      # 2. <profiles>/<repositories> — the repository URL itself, activated globally so
      #    Maven can find parent POMs during multi-module initialisation, before any
      #    pom.xml <repositories> sections have been parsed.
      #
      # Maven resolves ${env.GITHUB_TOKEN} and ${env.GITHUB_ACTOR} from the environment
      # at build time; the token value is never written literally into this file.
      - name: Configure Maven settings for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">
              <servers>
                  <server>
                      <id>MRISS-Projects-maven-repo</id>
                      <username>${env.GITHUB_ACTOR}</username>
                      <password>${env.GITHUB_TOKEN}</password>
                  </server>
                  <server>
                      <id>MRISS-Projects-maven-repo-plugins</id>
                      <username>${env.GITHUB_ACTOR}</username>
                      <password>${env.GITHUB_TOKEN}</password>
                  </server>
              </servers>
              <!--
                  Declare GitHub Packages as a repository in a settings profile so Maven can
                  resolve parent POMs (e.g. com.mriss:mriss-parent) from GitHub Packages
                  during multi-module build initialisation — before any pom.xml repository
                  sections are parsed.  Credentials are supplied via the <servers> block above.
                  Note: GitHub Packages always requires authentication; it cannot be made
                  fully anonymous even for public packages.
              -->
              <profiles>
                  <profile>
                      <id>github-packages</id>
                      <repositories>
                          <repository>
                              <id>MRISS-Projects-maven-repo</id>
                              <url>https://maven.pkg.github.com/MRISS-Projects/maven-repo</url>
                              <releases><enabled>true</enabled></releases>
                              <snapshots><enabled>true</enabled></snapshots>
                          </repository>
                      </repositories>
                      <pluginRepositories>
                          <pluginRepository>
                              <id>MRISS-Projects-maven-repo-plugins</id>
                              <url>https://maven.pkg.github.com/MRISS-Projects/maven-repo</url>
                              <releases><enabled>true</enabled></releases>
                              <snapshots><enabled>true</enabled></snapshots>
                          </pluginRepository>
                      </pluginRepositories>
                  </profile>
              </profiles>
              <activeProfiles>
                  <activeProfile>github-packages</activeProfile>
              </activeProfiles>
          </settings>
          EOF

      # Mirrors: mvn -U -B clean install (initial build from ReleaseJenkinsfile)
      - name: Build and Install
        run: mvn -B -U clean install

      # Mirrors: recursiveRelease -> mvn -P deployment deploy
      # Uses 'install' instead of 'deploy' to skip artifact publishing.
      # Skips SCM checkin (commit-readme-md execution in the deployment profile)
      # via maven.scm.skip=true so no commits are made.
      - name: Build with Deployment Profile (no artifact publishing)
        run: mvn -B -P deployment -Dmaven.scm.skip=true install

      # Mirrors: recursiveRelease -> mvn -P deployment,release-deployment site-deploy
      # Uses 'site' instead of 'site-deploy' to skip gh-pages publishing.
      - name: Generate Site (no gh-pages publishing)
        run: mvn -B -P deployment,release-deployment -Dsite.deployment.personal.main=file:///tmp/sites site
